<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | NovaTech</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    background:#f1f5f9;
    color:#1e293b;

}



/* HEADER */

header{

    background:#0f172a;
    padding:20px;

}


.navbar{

    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width:1200px;
    margin:auto;

}


.logo{

    color:white;
    font-size:28px;
    font-weight:bold;

}


.nav-links{

    list-style:none;
    display:flex;
    gap:25px;

}


.nav-links a{

    color:white;
    text-decoration:none;

}





/* PAGE HEADER */


.page-header{

    background:linear-gradient(135deg,#2563eb,#0f172a);

    color:white;

    text-align:center;

    padding:70px 20px;

}


.page-header h1{

    font-size:45px;

}


.page-header p{

    margin-top:10px;

}




/* CONTACT */


.contact-container{

    width:90%;
    max-width:1100px;

    margin:60px auto;

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:40px;

}



.contact-info,
.contact-form{

    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:0 10px 25px rgba(0,0,0,.1);

}




.contact-info h2{

    margin-bottom:20px;

}



.contact-info p{

    color:#64748b;

    line-height:1.6;

}



.info{

    margin-top:25px;

    display:flex;

    gap:15px;

    align-items:center;

}



.info span{

    font-size:16px;

}





input,
textarea{

    width:100%;

    padding:15px;

    margin-bottom:20px;

    border:1px solid #cbd5e1;

    border-radius:10px;

    font-size:16px;

}



textarea{

    resize:none;

}




button{

    width:100%;

    padding:15px;

    background:#2563eb;

    color:white;

    border:none;

    border-radius:10px;

    cursor:pointer;

    font-size:17px;

}



button:hover{

    background:#1d4ed8;

}





/* BACK FORWARD */

.page-navigation{

    display:flex;

    justify-content:center;

    gap:20px;

    margin:40px auto;

}



.page-navigation button{

    width:auto;

    padding:12px 30px;

}





footer{

    background:#0f172a;

    color:white;

    text-align:center;

    padding:25px;

}




/* MOBILE */


@media(max-width:768px){


.contact-container{

    grid-template-columns:1fr;

}



.nav-links{

    display:none;

}


.page-header h1{

    font-size:32px;

}



}



</style>


</head>



<body>




<header>


<nav class="navbar">


<div class="logo">

NovaTech

</div>


<ul class="nav-links">

<li>
<a href="index.html">
Home
</a>
</li>


<li>
<a href="about.html">
About
</a>
</li>


<li>
<a href="services.html">
Services
</a>
</li>


<li>
<a href="portfolio.html">
Portfolio
</a>
</li>


</ul>


</nav>


</header>






<section class="page-header">


<h1>

Contact Us

</h1>


<p>

Let's create something amazing

</p>


</section>







<section class="contact-container">





<div class="contact-info">


<h2>

Get In Touch

</h2>


<p>

Have a project? Send us your details.

</p>



<div class="info">

<span>📍</span>

<span>

Karachi, Pakistan

</span>

</div>



<div class="info">

<span>📧</span>

<span>

talhakhann48@gmail.com

</span>

</div>




<div class="info">

<span>📞</span>

<span>

03362398165

</span>

</div>



</div>







<div class="contact-form">



<form id="contactForm">


<input

id="name"

type="text"

placeholder="Your Name"

required>



<input

id="email"

type="email"

placeholder="Your Email"

required>




<input

id="subject"

type="text"

placeholder="Subject"

required>




<textarea

id="message"

rows="6"

placeholder="Your Message"

required></textarea>




<button type="submit">

Send Message

</button>



</form>



</div>





</section>







<div class="page-navigation">


<button onclick="goBack()">

← Back

</button>



<button onclick="goForward()">

Forward →

</button>



</div>







<footer>

© 2026 NovaTech All Rights Reserved.

</footer>







<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>



<script>



emailjs.init({

publicKey:"sk3Ap2G1WUz7GOAoU"

});





document
.getElementById("contactForm")
.addEventListener("submit",function(e){


e.preventDefault();



let button=document.querySelector("form button");


button.innerHTML="Sending...";



let data={


name:document.getElementById("name").value,


email:document.getElementById("email").value,


subject:document.getElementById("subject").value,


message:document.getElementById("message").value


};





emailjs.send(

"service_ljvynwr",

"template_pverydg",

data

)



.then(()=>{


alert("Message sent successfully!");

document
.getElementById("contactForm")
.reset();


button.innerHTML="Send Message";


})



.catch((error)=>{


alert(

"Error: "+error.text

);


button.innerHTML="Send Message";


});



});







function goBack(){

window.history.back();

}



function goForward(){

window.history.forward();

}



</script>



</body>

</html>
